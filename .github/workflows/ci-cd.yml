# ─────────────────────────────────────────────────────────────────────────────
# Project Aegis-Finance: CI/CD Pipeline
# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 (test):           Run pytest Quality Gates — build FAILS if tests fail
# Stage 2 (build-and-push): Build Docker image → Push to GHCR (on main branch)
# Stage 3 (deploy):          Deploy to Cloud Run (on main branch)
# ─────────────────────────────────────────────────────────────────────────────

name: Aegis Risk Gateway — CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/aegis-finance-api
  GCP_REGION: us-central1
  SERVICE_NAME: aegis-finance-api

jobs:
  # ── Stage 1: Quality Gate ───────────────────────────────────────────────────
  test:
    name: 🔬 Quality Gate (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify model artifacts exist
        run: |
          test -f models/aegis_preprocessor.pkl || (echo "❌ Preprocessor artifact missing!" && exit 1)
          test -f models/aegis_xgboost_v1.pkl  || (echo "❌ Model artifact missing!" && exit 1)
          echo "✅ Model artifacts verified."

      - name: Run Automated Quality Gates
        run: pytest --cov=app --cov-report=term-missing tests/ -v

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: .coverage

  # ── Stage 2: Build & Push Docker Image ──────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test   # Only runs if the test job passes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write   # Required to push to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # Auto-provided by GitHub

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha    # GitHub Actions cache for faster rebuilds
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "✅ Image pushed — ${{ steps.meta.outputs.tags }}"

  # ── Stage 3: Automated Deployment (Cloud Run) ─────────────────────────────
  deploy:
    name: 🚀 Continuous Deployment (Cloud Run)
    runs-on: ubuntu-latest
    needs: build-and-push   # Only runs if the build succeeds
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Authenticate with Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest # Pull from GHCR
          flags: |
            --port=8000
            --memory=1Gi
            --cpu=1
            --allow-unauthenticated

      - name: Final Verification Check
        run: |
          echo "✅ Service deployed successfully!"
          echo "🔗 URL: ${{ steps.deploy.outputs.url }}"
