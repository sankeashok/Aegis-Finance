# ─────────────────────────────────────────────────────────────────────────────
# Project Aegis-Finance: CI/CD Pipeline
# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 (test):           Run pytest Quality Gates — build FAILS if tests fail
# Stage 2 (build-and-push): Build Docker image → Push to Artifact Registry (GAR)
# Stage 3 (deploy):          Deploy to Cloud Run (on main branch)
# ─────────────────────────────────────────────────────────────────────────────

name: Aegis Risk Gateway — CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  GAR_LOCATION: us-central1-docker.pkg.dev
  GAR_REPOSITORY: aegis-finance-api
  SERVICE_NAME: aegis-finance-api
  GCP_REGION: us-central1

jobs:
  # ── Stage 1: Quality Gate ───────────────────────────────────────────────────
  test:
    name: 🔬 Quality Gate (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify model artifacts exist
        run: |
          test -f models/aegis_preprocessor.pkl || (echo "❌ Preprocessor artifact missing!" && exit 1)
          test -f models/aegis_xgboost_v1.pkl  || (echo "❌ Model artifact missing!" && exit 1)
          echo "✅ Model artifacts verified."

      - name: Run Automated Quality Gates
        run: pytest --cov=app --cov-report=term-missing tests/ -v

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: .coverage

  # ── Stage 2: Build & Push Docker Image (GAR) ────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Image (GAR)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Log in to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_LOCATION }}
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.SERVICE_NAME }}:latest
            ${{ env.GAR_LOCATION }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.SERVICE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Stage 3: Automated Deployment (Cloud Run) ─────────────────────────────
  deploy:
    name: 🚀 Continuous Deployment (Cloud Run)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GAR_LOCATION }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.SERVICE_NAME }}:latest
          flags: |
            --port=8000
            --memory=1Gi
            --cpu=1
            --allow-unauthenticated

      - name: Final Verification Check
        run: |
          echo "✅ Service deployed successfully via GAR!"
          echo "🔗 URL: ${{ steps.deploy.outputs.url }}"
